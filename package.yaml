name:                fx-converter
version:             0.1.0.0
github:              "david/fx-converter"
license:             BSD-3-Clause
author:              "david"
maintainer:          "example@example.com"
copyright:           "2026 david"
extra-source-files:
- README.md
- CHANGELOG.md
description:         Foreign Exchange Currency Converter
dependencies:
- base >= 4.7 && < 5
- containers
- text
- http-conduit
- aeson
- bytestring
ghc-options:
- -Wall
- -Wcompat
- -Widentities
- -Wincomplete-record-updates
- -Wincomplete-uni-patterns
- -Wmissing-export-lists
- -Wmissing-home-modules
- -Wpartial-fields
- -Wredundant-constraints
library:
  source-dirs: src
executables:
  fx-converter-exe:
    main:                Main.hs
    source-dirs:         app
    ghc-options:
    - -threaded
    - -rtsopts
    - -with-rtsopts=-N
    dependencies:
    - fx-converter
tests:
  fx-converter-test:
    main:                Spec.hs
    source-dirs:         test
    ghc-options:
    - -threaded
    - -rtsopts
    - -with-rtsopts=-N
    dependencies:
    - fx-converter
